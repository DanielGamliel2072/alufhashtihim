<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אלוף השטיחים - קטלוג 2026</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@200;300;400;600;700;800&display=swap');
        body {
            font-family: 'Assistant', sans-serif;
            background-color: #f9fafb;
        }
        .dir-rtl { direction: rtl; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const CARPETS_DATA = [
            { id: 20, name: "שטיח בוהו-נטורל דגם BOH-84", type: "מודרני", price: 1250, colors: ["קרם", "בז'"], sizes: ["160x230", "200x290"], rating: 5.0, description: "שטיח בוהו-שיק בעבודת אריגה ייחודית המשלבת טקסטורות מובלטות ופרנזים מעוצבים. השטיח עשוי מחומרים טבעיים ומעניק אווירת רוגע ונוחות לבית המודרני.", image: "https://i.ibb.co/S4pchMkH/IMG-1784.png", realImage: true },
            { id: 17, name: "שטיח אבסטרקט גלקסיה דגם HA-QTK", type: "מודרני", price: 1650, colors: ["כחול", "כתום", "אפור"], sizes: ["160x230", "200x290", "240x340"], rating: 5.0, description: "עיצוב נועז ומרגש המשלבת משיכות מכחול אבסטרקטיות בגווני כחול עמוק, כתום תוסס ואפור.", image: "https://i.ibb.co/Pv8Vss1Q/Gemini-Generated-Image-haqtkxhaqtkxhaqt.png", realImage: true },
            { id: 16, name: "שטיח גיאומטרי תלת-ממד דגם UF-SDY", type: "מודרני", price: 1590, colors: ["אפור", "קרם", "בז'"], sizes: ["160x230", "200x290", "240x340"], rating: 5.0, description: "עיצוב גיאומטרי חדשני המשלב טקסטורות עומק וגבהים שונים של סיבים, למראה תלת-ממדי יוקרתי.", image: "https://i.ibb.co/kgWnr2FG/Gemini-Generated-Image-ufsdyjufsdyjufsd.png", realImage: true },
            { id: 15, name: "שטיח אבסטרקט אוקיינוס דגם YQI-XI", type: "מודרני", price: 1350, colors: ["כחול", "תכלת", "אפור"], sizes: ["160x230", "200x290", "240x340"], rating: 5.0, description: "עיצוב השואב השראה ממעמקי האוקיינוס, עם מעברים רכים בין כחול עמוק לתכלת ואפור.", image: "https://i.ibb.co/BVkzWS7y/Gemini-Generated-Image-yqixityqixityqix.png", realImage: true },
            { id: 14, name: "שטיח אבסטרקט לבה דגם MLU-9W", type: "מודרני", price: 1480, colors: ["כתום", "אפור", "חום"], sizes: ["160x230", "200x290", "240x340"], rating: 5.0, description: "עיצוב עוצמתי המשלבת גווני כתום חלודה עם אפור עמוק וטקסטורות חוליות.", image: "https://i.ibb.co/G34ddkxS/Gemini-Generated-Image-mlu9w4mlu9w4mlu9.png", realImage: true },
            { id: 13, name: "שטיח אבסטרקט מלורי דגם F4P-U0", type: "מודרני", price: 1420, colors: ["אפור", "כחול", "לבן"], sizes: ["160x230", "200x290", "240x340"], rating: 5.0, description: "עיצוב אבסטרקטי מרהיב המשלב זרימה של גווני אפור וכחול שמיים עם נגיעות לבן צחור.", image: "https://i.ibb.co/CyCwn88/Gemini-Generated-Image-f4pu0ff4pu0ff4pu.png", realImage: true },
            { id: 12, name: "שטיח מנדלה רויאל דגם K1X-C4", type: "קלאסי", price: 1550, colors: ["כחול", "לבן", "זהב"], sizes: ["200x200", "240x240", "160x230"], rating: 5.0, description: "עיצוב מנדלה עוצר נשימה בגווני כחול מלכותי ולבן עם עיטורי זהב עדינים.", image: "https://i.ibb.co/prwYQQ8Z/Gemini-Generated-Image-k1xc44k1xc44k1xc.png", realImage: true },
            { id: 2, name: "שטיח איספהאן קלאסי", type: "קלאסי", price: 1200, colors: ["אדום", "זהב"], sizes: ["170x240", "250x350"], rating: 4.8, description: "שטיח פרסי בעבודת מכונה מדויקת, עיצוב עשיר בפרטים.", image: "https://images.unsplash.com/photo-1600166898405-da9535204843?auto=format&fit=crop&q=80&w=800" }
        ];

        const REVIEWS_DATA = [
            { id: 1, name: "מיכל כהן", text: "השטיח הגיע מהר מאוד, האיכות פשוט מדהימה. השטיח רך ונעים למגע, בדיוק מה שחיפשתי לסלון.", stars: 5 },
            { id: 2, name: "יוסי לוי", text: "שירות מעולה ומקצועי. הדגם הגיאומטרי שקניתי משנה את כל האווירה בבית. מומלץ בחום!", stars: 5 },
            { id: 3, name: "עדי רז", text: "חיפשתי שטיח בוהו שיהיה גם איכותי וגם קל לניקוי. מצאתי כאן את הדגם המושלם. תודה רבה!", stars: 5 },
            { id: 4, name: "דניאל סופר", text: "המחירים הוגנים והמבחר עצום. קניתי שטיח אבסטרקט וקיבלתי המון מחמאות עליו.", stars: 4 }
        ];

        const colorMap = {
            "אפור": "#808080", "קרם": "#f5f5dc", "כחול": "#2b4c7e", "אדום": "#b22222", "זהב": "#d4af37",
            "לבן": "#ffffff", "תכלת": "#87ceeb", "חום": "#5d4037", "כתום": "#d35400", "בז'": "#d2b48c"
        };

        const Icon = ({ name, className }) => {
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [currentPage, setCurrentPage] = useState('home');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [filters, setFilters] = useState({ type: 'הכל', color: 'הכל' });
            const [contactSuccess, setContactSuccess] = useState(false);
            const contactEmail = "danielgamliel2072@gmail.com";

            useEffect(() => {
                lucide.createIcons();
            }, [currentPage, contactSuccess]);

            const filteredProducts = useMemo(() => {
                return CARPETS_DATA.filter(p => {
                    return (filters.type === 'הכל' || p.type === filters.type) &&
                           (filters.color === 'הכל' || p.colors.includes(filters.color));
                });
            }, [filters]);

            const scrollToContact = () => {
                document.getElementById('contact')?.scrollIntoView({ behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen bg-gray-50 text-gray-900 font-sans">
                    {/* Header */}
                    <nav className="sticky top-0 z-50 bg-white shadow-sm border-b border-gray-100">
                        <div className="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
                            <h1 className="text-3xl font-black text-amber-800 cursor-pointer" onClick={() => setCurrentPage('home')}>
                                אלוף השטיחים
                            </h1>
                            <div className="flex items-center gap-4">
                                <button onClick={() => window.location.href = `mailto:${contactEmail}`} className="bg-amber-100 text-amber-900 px-6 py-2 rounded-full font-bold flex items-center gap-2">
                                    <Icon name="mail" className="w-4 h-4" />
                                    צור קשר
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-4 py-8">
                        {currentPage === 'home' ? (
                            <div className="space-y-12">
                                {/* Hero */}
                                <div className="relative rounded-3xl overflow-hidden h-96 flex items-center justify-center text-center text-white bg-gray-800">
                                    <img src="https://images.unsplash.com/photo-1579656592043-a20e25a4aa4b?auto=format&fit=crop&q=80&w=1600" className="absolute inset-0 w-full h-full object-cover opacity-40" />
                                    <div className="relative z-10 px-6">
                                        <h2 className="text-5xl font-black mb-4">קטלוג שטיחי יוקרה 2026</h2>
                                        <p className="text-xl font-light">הקולקציה החדשה זמינה כעת לצפייה</p>
                                    </div>
                                </div>

                                {/* Filters */}
                                <div className="bg-white p-6 rounded-2xl shadow-sm flex flex-wrap gap-4">
                                    <div className="flex-1 min-w-[150px]">
                                        <label className="block text-sm font-bold mb-2">סגנון</label>
                                        <select className="w-full p-3 border rounded-xl" onChange={(e) => setFilters({...filters, type: e.target.value})}>
                                            <option>הכל</option><option>מודרני</option><option>קלאסי</option>
                                        </select>
                                    </div>
                                    <div className="flex-1 min-w-[150px]">
                                        <label className="block text-sm font-bold mb-2">צבע</label>
                                        <select className="w-full p-3 border rounded-xl" onChange={(e) => setFilters({...filters, color: e.target.value})}>
                                            <option>הכל</option>
                                            {Object.keys(colorMap).map(c => <option key={c}>{c}</option>)}
                                        </select>
                                    </div>
                                </div>

                                {/* Grid */}
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {filteredProducts.map(product => (
                                        <div key={product.id} className="bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100 group flex flex-col">
                                            <div className="h-64 bg-gray-50 flex items-center justify-center relative">
                                                <img src={product.image} className="h-full w-full object-contain p-4 group-hover:scale-105 transition" />
                                            </div>
                                            <div className="p-6 flex-1 flex flex-col">
                                                <h3 className="text-xl font-bold">{product.name}</h3>
                                                <div className="flex justify-between items-center mt-auto pt-4">
                                                    <span className="text-2xl font-black text-amber-800">₪{product.price}</span>
                                                    <button 
                                                        onClick={() => { setSelectedProduct(product); setCurrentPage('product'); window.scrollTo(0,0); }}
                                                        className="bg-amber-600 text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-amber-700 transition"
                                                    >
                                                        פרטים נוספים
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* Reviews Section */}
                                <section className="py-12 bg-amber-50 rounded-[3rem] px-8 border border-amber-100">
                                    <div className="text-center mb-10">
                                        <h2 className="text-3xl font-black text-amber-900 mb-2">מה הלקוחות שלנו אומרים</h2>
                                        <div className="h-1 w-20 bg-amber-600 mx-auto rounded-full"></div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                        {REVIEWS_DATA.map(review => (
                                            <div key={review.id} className="bg-white p-6 rounded-2xl shadow-sm border border-amber-100">
                                                <div className="flex gap-1 mb-3">
                                                    {[...Array(5)].map((_, i) => (
                                                        <Icon 
                                                            key={i} 
                                                            name="star" 
                                                            className={`w-4 h-4 ${i < review.stars ? 'text-amber-500 fill-amber-500' : 'text-gray-300'}`} 
                                                        />
                                                    ))}
                                                </div>
                                                <p className="text-gray-600 text-sm italic mb-4 leading-relaxed">"{review.text}"</p>
                                                <div className="font-bold text-amber-900 border-t border-gray-50 pt-3">{review.name}</div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        ) : (
                            <div className="space-y-8">
                                <button onClick={() => setCurrentPage('home')} className="flex items-center gap-2 text-amber-800 font-bold hover:translate-x-1 transition">
                                    <Icon name="chevron-right" className="w-5 h-5" /> חזרה לקטלוג
                                </button>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                                    <div className="bg-white rounded-3xl p-8 shadow-sm flex items-center justify-center">
                                        <img src={selectedProduct.image} className="w-full max-h-[500px] object-contain" />
                                    </div>
                                    <div className="space-y-6">
                                        <h1 className="text-4xl font-black text-gray-900">{selectedProduct.name}</h1>
                                        <div className="flex items-center gap-4">
                                            <p className="text-3xl font-bold text-amber-700">₪{selectedProduct.price}</p>
                                            <div className="bg-amber-50 px-3 py-1 rounded-full text-amber-800 text-sm font-bold border border-amber-100">{selectedProduct.type}</div>
                                        </div>
                                        <p className="text-gray-600 text-lg leading-relaxed">{selectedProduct.description}</p>
                                        <div className="grid grid-cols-2 gap-4 pt-4">
                                            <div className="bg-white p-4 rounded-2xl border border-gray-100">
                                                <p className="text-xs text-gray-400 mb-1">גוונים</p>
                                                <div className="flex gap-2">
                                                    {selectedProduct.colors.map(c => (
                                                        <div key={c} className="w-4 h-4 rounded-full border" style={{ background: colorMap[c] }} title={c} />
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="bg-white p-4 rounded-2xl border border-gray-100">
                                                <p className="text-xs text-gray-400 mb-1">מידות זמינות</p>
                                                <p className="text-sm font-bold">{selectedProduct.sizes.join(' | ')}</p>
                                            </div>
                                        </div>
                                        <div className="pt-6">
                                            <button onClick={scrollToContact} className="w-full bg-gray-900 text-white py-5 rounded-2xl font-bold text-xl hover:bg-black transition shadow-lg flex items-center justify-center gap-3">
                                                <Icon name="message-square" className="w-6 h-6 text-amber-500" />
                                                השאירו פרטים להזמנה
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Contact */}
                        <section id="contact" className="mt-20 bg-gray-900 rounded-[3rem] p-10 text-white text-center relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-64 h-64 bg-amber-600/10 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2"></div>
                            {contactSuccess ? (
                                <div className="py-10 animate-in zoom-in duration-500">
                                    <Icon name="check-circle-2" className="w-20 h-20 text-green-400 mx-auto mb-4" />
                                    <h3 className="text-3xl font-bold">פנייתכם התקבלה בהצלחה!</h3>
                                    <p className="text-gray-400 mt-2">נציג מטעמנו יחזור אליכם בהקדם.</p>
                                </div>
                            ) : (
                                <div className="max-w-xl mx-auto space-y-8 relative z-10">
                                    <div className="space-y-2">
                                        <h2 className="text-4xl font-black">מעוניינים במידע נוסף?</h2>
                                        <p className="text-gray-400 text-lg">השאירו פרטים ונחזור אליכם לשיחת ייעוץ אישית</p>
                                    </div>
                                    <form onSubmit={(e) => { e.preventDefault(); setContactSuccess(true); }} className="space-y-4">
                                        <input required type="text" placeholder="שם מלא" className="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none focus:border-amber-500 transition" />
                                        <input required type="email" placeholder="אימייל לחזרה" className="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none focus:border-amber-500 transition" />
                                        <button className="w-full bg-amber-600 py-4 rounded-2xl font-bold text-xl hover:bg-amber-500 transition shadow-xl flex items-center justify-center gap-2">
                                            <Icon name="send" className="w-5 h-5" />
                                            שלח פנייה
                                        </button>
                                    </form>
                                    <div className="pt-4 flex justify-center items-center gap-2 text-gray-500 text-sm">
                                        <Icon name="mail" className="w-4 h-4" />
                                        <span>{contactEmail}</span>
                                    </div>
                                </div>
                            )}
                        </section>
                    </main>

                    <footer className="py-12 text-center text-gray-400 text-sm border-t border-gray-100 bg-white mt-12">
                        <div className="max-w-7xl mx-auto px-4">
                            <h4 className="text-amber-900 font-bold text-lg mb-2">אלוף השטיחים</h4>
                            <p>© 2026 כל הזכויות שמורות - איכות ויוקרה לבית שלך</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
